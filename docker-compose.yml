version: '3.8'

services:
  # 1. The PostgreSQL Database
  postgres-db:
    image: postgres:17
    container_name: coweave-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: sonu1234
      POSTGRES_DB: coweave_db
    # Notice: Ports removed for production security!
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - coweave_net

  # 2. The Redis Cache
  redis:
    image: redis:alpine
    container_name: coweave-redis
    restart: unless-stopped
    # Notice: Ports removed for production security!
    networks:
      - coweave_net

  # 3. The Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: coweave-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # This points directly to the service name "postgres-db" on its default internal port 5432
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/coweave_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: sonu1234
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      - postgres-db
      - redis
    networks:
      - coweave_net

  # 4. The Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # We will update these to your actual domain name in Phase 4
        NEXT_PUBLIC_API_URL: http://YOUR_VPS_IP:8080
        NEXT_PUBLIC_WS_URL: http://YOUR_VPS_IP:8080
    container_name: coweave-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - coweave_net

# Permanent storage for your database
volumes:
  postgres-data:

# Private internal network
networks:
  coweave_net:
    driver: bridge