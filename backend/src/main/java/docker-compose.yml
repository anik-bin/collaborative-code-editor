version: '3.8'

services:
  postgres-db:
    image: postgres:latest
    container_name: coweave-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: sonu1234
      POSTGRES_DB: coweave_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: